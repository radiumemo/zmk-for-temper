---
include:
  # The physical Left Half (now demoted to a peripheral)
  - board: nice_nano_v2
    shield: temper_left
    artifact-name: temper_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # The physical Right Half (peripheral by default)
  - board: nice_nano_v2
    shield: temper_right
    artifact-name: temper_right
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # The Dongle (Uses the left shield's layout, but acts as the central brain)
  - board: nice_nano_v2
    shield: temper_left
    artifact-name: temper_dongle
    cmake-args: -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
