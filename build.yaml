include:
  # 1. The USB Dongle (Central Hub) - Now correctly formatted with BOTH flags
  - board: nice_nano//zmk
    shield: temper_dongle
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

  # 2. Left Keyboard Half (Peripheral)
  - board: nice_nano//zmk
    shield: temper_left nice_view_adapter nice_view_gem
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # 3. Right Keyboard Half (Peripheral)
  - board: nice_nano//zmk
    shield: temper_right nice_view_adapter nice_view_gem
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # 4. Settings Reset File 
  - board: nice_nano//zmk
    shield: settings_reset
